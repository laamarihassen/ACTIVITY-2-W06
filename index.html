<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layout Example 2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="wrapper">

    <!-- Top header section -->
    <header class="block topbar">
      <section class="logo">Logo</section>

      <nav class="nav">
        <a href="index.html">Layout 2</a>
        <a href="layout3.html">Layout 3</a>
        <a href="#">Link</a>
      </nav>
    </header>

    <!-- Banner section -->
    <section class="block l2-header">
      Header/Banner
    </section>

    <!-- Intro section -->
    <section class="block l2-intro">
      Intro text area
    </section>

    <!-- Content boxes section -->
    <section class="l2-boxes">
      <section class="l2-box">Box 1</section>
      <section class="l2-box">Box 2</section>
      <section class="l2-box">Box 3</section>

    <footer class="block l2-footer">
      Footer

  </main>

</body>
</html>
